spring:
  application:
    name: Product Service
  config:
    import: ""
  cloud:
    discovery:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_LOCAL_PORT:5432}/${POSTGRES_DB:products}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

eureka:
  client:
    enabled: false
